version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bus_ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sam123@#%
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  backend-1:
    build: ./backend
    environment:
      DEBUG: "False"
      DB_NAME: bus_ticket_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: db
    depends_on:
      - db

  backend-2:
    build: ./backend
    environment:
      DEBUG: "False"
      DB_NAME: bus_ticket_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: db
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-1
      - backend-2

volumes:
  postgres_data:
